<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GhostJob</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">
    <span class="logo">👻</span>
    <span class="title">GhostJob</span>
  </div>
  <div class="content" id="content">
    <p class="subtitle">Open a job description on LinkedIn, Indeed, or Glassdoor to verify it.</p>
    
    <button id="analyze-btn" class="btn primary">Detect Ghost Job</button>
    
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p class="subtitle">Analyzing 15+ red flags...</p>
    </div>
    
    <div id="result" class="hidden">
      <div class="score-container">
        <span id="ghost-score" class="score">--</span>
        <span class="score-label">Ghost Score</span>
      </div>
      <h3 id="verdict"></h3>
      <p id="headline"></p>
      <button id="full-report-btn" class="btn secondary">View Full Report</button>
    </div>
    
    <div id="error" class="hidden error-text"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
